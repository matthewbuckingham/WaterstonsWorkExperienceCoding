
<style>
  #banner-root { cursor: pointer; user-select: none; }
  .px-heart, .px-star, .px-mushroom, .px-gem, .px-ctrl { transition: transform 0.15s ease; transform-origin: center; }

  @keyframes heartBeat {
    0%   { transform: scale(1) rotate(0deg); }
    20%  { transform: scale(1.35) rotate(-12deg); }
    40%  { transform: scale(0.9) rotate(8deg); }
    60%  { transform: scale(1.2) rotate(-6deg); }
    80%  { transform: scale(1.0) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes starSpin {
    0%   { transform: rotate(0deg) scale(1); }
    30%  { transform: rotate(180deg) scale(1.4); }
    70%  { transform: rotate(300deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }
  @keyframes mushBounce {
    0%   { transform: translateY(0px) scale(1); }
    25%  { transform: translateY(-18px) scale(1.05); }
    50%  { transform: translateY(-6px) scale(0.95); }
    70%  { transform: translateY(-14px) scale(1.02); }
    90%  { transform: translateY(-2px) scale(0.98); }
    100% { transform: translateY(0px) scale(1); }
  }
  @keyframes gemSpin {
    0%   { transform: rotateY(0deg) scale(1); }
    40%  { transform: rotateY(180deg) scale(1.3); }
    80%  { transform: rotateY(320deg) scale(1.05); }
    100% { transform: rotateY(360deg) scale(1); }
  }
  @keyframes ctrlWiggle {
    0%   { transform: rotate(0deg) scale(1); }
    15%  { transform: rotate(-15deg) scale(1.15); }
    35%  { transform: rotate(12deg) scale(1.1); }
    55%  { transform: rotate(-8deg) scale(1.05); }
    75%  { transform: rotate(5deg) scale(1.02); }
    100% { transform: rotate(0deg) scale(1); }
  }
  @keyframes logoPop {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.04); }
    60%  { transform: scale(0.97); }
    100% { transform: scale(1); }
  }
  @keyframes sparkle {
    0%   { opacity: 0; transform: scale(0); }
    50%  { opacity: 1; transform: scale(1.5); }
    100% { opacity: 0; transform: scale(0); }
  }
  .px-heart.go  { animation: heartBeat 0.7s ease forwards; transform-origin: 68px 76px; }
  .px-star.go   { animation: starSpin 0.8s ease forwards; transform-origin: 592px 68px; }
  .px-mushroom.go { animation: mushBounce 0.75s ease forwards; transform-origin: 65px 178px; }
  .px-gem.go    { animation: gemSpin 0.8s ease forwards; transform-origin: 590px 192px; }
  .px-ctrl.go   { animation: ctrlWiggle 0.65s ease forwards; transform-origin: 340px 250px; }
  .px-logo.go   { animation: logoPop 0.5s ease forwards; transform-origin: 340px 94px; }
  .sparkle-dot  { animation: sparkle 0.6s ease forwards; transform-origin: center; }
</style>

<script>
const banner = document.getElementById('banner-root');
const sparklesGroup = document.getElementById('sparkles');
const animated = ['px-heart','px-star','px-mushroom','px-gem','px-ctrl','px-logo'];

function triggerAnimation() {
  animated.forEach(cls => {
    const el = banner.querySelector('.' + cls);
    if (!el) return;
    el.classList.remove('go');
    void el.offsetWidth;
    el.classList.add('go');
    el.addEventListener('animationend', () => el.classList.remove('go'), { once: true });
  });

  sparklesGroup.style.opacity = '1';
  const dots = sparklesGroup.querySelectorAll('.sparkle-dot');
  dots.forEach((d, i) => {
    d.style.animation = 'none';
    void d.offsetWidth;
    d.style.animationDelay = (i * 0.06) + 's';
    d.style.animation = 'sparkle 0.6s ease forwards';
  });
  setTimeout(() => { sparklesGroup.style.opacity = '0'; }, 900);
}

banner.addEventListener('click', triggerAnimation);
</script>
